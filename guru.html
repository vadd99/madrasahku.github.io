<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Guru - AL-HADI</title>
    
    <!-- CSS Wajib Layout & Komponen -->
    <link rel="stylesheet" href="css/style-base.css">
    <link rel="stylesheet" href="css/style-layout.css">
    <link rel="stylesheet" href="css/style-components.css">
    
    <!-- CSS Khusus Halaman Guru -->
    <link rel="stylesheet" href="css/style-guru.css">

    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="dark">

    <div id="layout-wrapper"></div>

    <template id="page-content">
        <div class="guru-page-container">
            
            <!-- Toolbar Atas -->
            <div class="page-toolbar">
                <div class="toolbar-info">
                    <h2 class="page-title">Data Tenaga Pengajar</h2>
                    <p class="page-subtitle">Kelola informasi guru dan alokasi kelas mengajar.</p>
                </div>
                <button class="btn-primary" onclick="openFormModal()">
                    <i data-lucide="user-plus" class="btn-icon"></i>
                    <span>Tambah Guru</span>
                </button>
            </div>

            <!-- Area Data Guru -->
            <div class="guru-content-card">
                
                <!-- Tampilan Kosong -->
                <div id="empty-state" class="empty-state">
                    <div class="empty-icon-wrapper">
                        <i data-lucide="users-round"></i>
                    </div>
                    <h3 class="empty-title">Belum Ada Data Guru</h3>
                    <p class="empty-desc">Data guru masih kosong. Klik tombol di bawah untuk menambahkan data guru baru.</p>
                    <button class="btn-primary-outline" onclick="openFormModal()">
                        <i data-lucide="plus"></i>
                        <span>Tambah Data Pertama</span>
                    </button>
                </div>

                <!-- List Guru (Simpel & Responsive) -->
                <div id="guru-list-container" class="guru-list-grid hidden">
                    <!-- Card Guru dimuat dinamis via JS -->
                </div>

            </div>

        </div>

        <!-- 1. MODAL DETAIL GURU (Saat nama diklik) -->
        <div id="modal-detail-guru" class="modal-overlay">
            <div class="modal-card">
                <div class="modal-header">
                    <div class="modal-header-title">
                        <i data-lucide="user-check" class="modal-header-icon"></i>
                        <h3>Detail Data Guru</h3>
                    </div>
                    <button class="btn-close-modal" onclick="closeDetailModal()">
                        <i data-lucide="x"></i>
                    </button>
                </div>

                <div class="modal-body detail-body">
                    <div class="detail-item">
                        <span class="detail-label">Nama Lengkap</span>
                        <div id="detail-nama" class="detail-value text-bold">-</div>
                    </div>

                    <div class="detail-item">
                        <span class="detail-label">Kelas Ajar</span>
                        <div><span id="detail-kelas" class="badge">-</span></div>
                    </div>

                    <div class="detail-item">
                        <span class="detail-label">No. HP / WhatsApp</span>
                        <div id="detail-hp" class="detail-value">-</div>
                    </div>

                    <div class="detail-item">
                        <span class="detail-label">Alamat</span>
                        <div id="detail-alamat" class="detail-value">-</div>
                    </div>
                </div>

                <!-- Tombol Edit & Hapus di Paling Bawah Modal -->
                <div class="modal-footer detail-footer">
                    <button type="button" class="btn btn-cancel" onclick="closeDetailModal()">Tutup</button>
                    <button type="button" class="btn btn-edit" id="btn-action-edit">
                        <i data-lucide="edit-3"></i>
                        <span>Edit</span>
                    </button>
                    <button type="button" class="btn btn-danger" id="btn-action-delete">
                        <i data-lucide="trash-2"></i>
                        <span>Hapus</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- 2. MODAL FORM INPUT/EDIT GURU -->
        <div id="modal-form-guru" class="modal-overlay">
            <div class="modal-card">
                <div class="modal-header">
                    <div class="modal-header-title">
                        <i data-lucide="user-plus" class="modal-header-icon" id="form-icon"></i>
                        <h3 id="form-title">Tambah Data Guru</h3>
                    </div>
                    <button class="btn-close-modal" onclick="closeFormModal()">
                        <i data-lucide="x"></i>
                    </button>
                </div>

                <form id="form-guru" onsubmit="saveGuruData(event)">
                    <div class="modal-body">
                        <div class="form-group">
                            <label for="nama-guru">Nama Lengkap & Gelar</label>
                            <input type="text" id="nama-guru" class="form-input" placeholder="Contoh: Ustadz Ahmad, S.Pd." required>
                        </div>

                        <div class="form-group">
                            <label for="kelas-ajar">Kelas yang Diajar</label>
                            <select id="kelas-ajar" class="form-input" required>
                                <option value="" disabled selected>-- Pilih Kelas --</option>
                                <option value="Kelas 1">Kelas 1</option>
                                <option value="Kelas 2">Kelas 2</option>
                                <option value="Kelas 3">Kelas 3</option>
                                <option value="Kelas 4">Kelas 4</option>
                                <option value="Kelas 5">Kelas 5</option>
                                <option value="Kelas 6">Kelas 6</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="no-hp">Nomor HP / WhatsApp</label>
                            <input type="tel" id="no-hp" class="form-input" placeholder="Contoh: 081234567890" pattern="[0-9]{10,15}" required>
                        </div>

                        <div class="form-group">
                            <label for="alamat-guru">Alamat Tempat Tinggal</label>
                            <textarea id="alamat-guru" class="form-input form-textarea" rows="3" placeholder="Masukkan alamat lengkap..." required></textarea>
                        </div>
                    </div>

<div class="modal-footer">
    <button type="button" class="btn btn-cancel" onclick="closeFormModal()">Batal</button>
    
    <!-- Tambahkan id="btn-simpan-guru" dan atribut disabled -->
    <button type="submit" class="btn btn-save" id="btn-simpan-guru" disabled>
        <i data-lucide="save"></i>
        <span>Simpan</span>
    </button>
</div>

                </form>
            </div>
        </div>
    </template>

    <script src="js/main.js"></script>
    <script type="module" src="js/guru.js"></script>
</body>
</html>
