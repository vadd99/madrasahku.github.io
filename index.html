<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Statistik - AL-HADI</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="dark">

    <!-- Container Utama Layout (Header & Sidebar akan dimuat di sini oleh main.js) -->
    <div id="layout-wrapper"></div>

    <!-- Template Konten Halaman Ini -->
    <template id="page-content">
        <div class="welcome-banner">
            <div class="badge">
                <span class="badge-dot"></span>
                <span>Ringkasan Data Real-time</span>
            </div>
            <h2 class="welcome-title">Selamat Datang di Portal Rekap Al-Hadi</h2>
            <p class="welcome-desc">
                Pantau statistik pertumbuhan santri, distribusi per kelas, serta jumlah tenaga pengajar dalam satu panel terpadu.
            </p>
        </div>

        <!-- Ringkasan Statistik Utama -->
        <div class="stats-grid-primary">
            <div class="stat-card">
                <div class="stat-card-header">
                    <span class="stat-label">Total Santri Keseluruhan</span>
                    <div class="stat-icon-wrapper">
                        <i data-lucide="users"></i>
                    </div>
                </div>
                <div class="stat-value-container">
                    <span class="stat-value">0</span>
                    <span class="stat-unit">Santri Terdaftar</span>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-card-header">
                    <span class="stat-label">Jumlah Guru</span>
                    <div class="stat-icon-wrapper">
                        <i data-lucide="user-check"></i>
                    </div>
                </div>
                <div class="stat-value-container">
                    <span class="stat-value">0</span>
                    <span class="stat-unit">Pengajar Aktif</span>
                </div>
            </div>
        </div>

        <!-- Statistik Santri Per Kelas -->
        <div>
            <div class="section-header">
                <h3 class="section-title">Statistik Santri Per Kelas</h3>
                <p class="section-subtitle">Rincian jumlah santri aktif di setiap jenjang kelas</p>
            </div>

            <div class="stats-grid-classes">
                <div class="class-card">
                    <div class="class-card-top">
                        <span class="class-badge">Tingkat I</span>
                        <span class="class-name">Kelas 1</span>
                    </div>
                    <div class="class-value">0</div>
                    <div class="class-label">Jumlah Santri</div>
                </div>
                <div class="class-card">
                    <div class="class-card-top">
                        <span class="class-badge">Tingkat II</span>
                        <span class="class-name">Kelas 2</span>
                    </div>
                    <div class="class-value">0</div>
                    <div class="class-label">Jumlah Santri</div>
                </div>
                <div class="class-card">
                    <div class="class-card-top">
                        <span class="class-badge">Tingkat III</span>
                        <span class="class-name">Kelas 3</span>
                    </div>
                    <div class="class-value">0</div>
                    <div class="class-label">Jumlah Santri</div>
                </div>
                <div class="class-card">
                    <div class="class-card-top">
                        <span class="class-badge">Tingkat IV</span>
                        <span class="class-name">Kelas 4</span>
                    </div>
                    <div class="class-value">0</div>
                    <div class="class-label">Jumlah Santri</div>
                </div>
                <div class="class-card">
                    <div class="class-card-top">
                        <span class="class-badge">Tingkat V</span>
                        <span class="class-name">Kelas 5</span>
                    </div>
                    <div class="class-value">0</div>
                    <div class="class-label">Jumlah Santri</div>
                </div>
                <div class="class-card">
                    <div class="class-card-top">
                        <span class="class-badge">Tingkat VI</span>
                        <span class="class-name">Kelas 6</span>
                    </div>
                    <div class="class-value">0</div>
                    <div class="class-label">Jumlah Santri</div>
                </div>
            </div>
        </div>
    </template>

    <script src="js/main.js"></script>
</body>
</html>
