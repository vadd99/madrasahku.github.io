<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Statistik - AL-HADI</title>
    <!-- Jalur CSS disesuaikan ke root -->
    <link rel="stylesheet" href="css/style-base.css">
    <link rel="stylesheet" href="css/style-layout.css">
    <link rel="stylesheet" href="css/style-components.css">
    <link rel="stylesheet" href="css/style-index.css">            
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="dark">

    <!-- Container Utama Layout (Header & Sidebar dimuat oleh script.js) -->
    <div id="layout-wrapper"></div>

    <!-- Template Konten Halaman -->
    <template id="page-content">
        <div class="dashboard-single-screen">
            
            <!-- Banner Ringkas (Compact Strip) -->
            <div class="welcome-strip">
                <div class="welcome-info">
                    <h2 class="welcome-title">Portal Rekap Al-Hadi</h2>
                    <p class="welcome-desc">Ringkasan statistik pertumbuhan santri & tenaga pengajar secara real-time.</p>
                </div>
                <div class="badge">
                    <span class="badge-dot"></span>
                    <span>Live Data</span>
                </div>
            </div>

            <!-- Ringkasan Statistik Utama -->
            <div class="stats-grid-primary">
                <div class="stat-card">
                    <div class="stat-card-body">
                        <span class="stat-label">Total Santri Keseluruhan</span>
                        <div class="stat-value-container">
                            <!-- ID Tambahan untuk JS -->
                            <span id="total-santri-value" class="stat-value">0</span>
                            <span class="stat-unit">Santri Terdaftar</span>
                        </div>
                    </div>
                    <div class="stat-icon-wrapper">
                        <i data-lucide="users"></i>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-card-body">
                        <span class="stat-label">Jumlah Tenaga Pengajar</span>
                        <div class="stat-value-container">
                            <!-- ID Tambahan untuk JS -->
                            <span id="total-guru-value" class="stat-value">0</span>
                            <span class="stat-unit">Guru Aktif</span>
                        </div>
                    </div>
                    <div class="stat-icon-wrapper">
                        <i data-lucide="user-check"></i>
                    </div>
                </div>
            </div>

            <!-- Statistik Santri Per Kelas -->
            <div class="classes-container">
                <div class="section-header">
                    <h3 class="section-title">
                        <i data-lucide="graduation-cap" class="section-icon"></i>
                        Distribusi Santri Per Kelas
                    </h3>
                    <span class="section-subtitle">Data per kelas</span>
                </div>

                <!-- Container Card Kelas Dinamis (Dimuat via JS) -->
                <div id="stats-grid-classes" class="stats-grid-classes">
                    <!-- Loading State Awal -->
                    <div style="grid-column: 1 / -1; text-align: center; color: var(--text-muted); padding: 20px 0;">
                        Memuat data statistik kelas...
                    </div>
                </div>
            </div>

        </div>
    </template>

    <!-- Script Utama -->
    <script src="js/main.js"></script>
    <!-- Diubah menjadi type="module" agar bisa import Firebase -->
    <script type="module" src="js/index.js"></script>    
</body>
</html>
