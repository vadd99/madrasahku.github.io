<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekap Nilai Santri - AL-HADI</title>
    
    <link rel="stylesheet" href="css/style-base.css">
    <link rel="stylesheet" href="css/style-layout.css">
    <link rel="stylesheet" href="css/style-components.css">
    <link rel="stylesheet" href="css/style-absensi.css">
    <link rel="stylesheet" href="css/style-rekap.css">

    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="dark">
    <div id="layout-wrapper"></div>
    <template id="page-content">
        <div class="absensi-page-container">
            <div class="page-toolbar">
                <div class="toolbar-info">
                    <button id="btn-back-kelas" class="btn-back hidden" onclick="goBackToKelasList()">
                        <i data-lucide="arrow-left"></i>
                        <span>Kembali ke Daftar Kelas</span>
                    </button>
                    <h2 class="page-title" id="page-title">Rekap Nilai Santri</h2>
                    <p class="page-subtitle" id="page-subtitle">Pilih kelas untuk mengelola nilai harian santri.</p>
                </div>

                <!-- PERBAIKAN: Layout yang lebih rapi menggunakan CSS eksternal -->
                <div id="nilai-selectors" class="selectors-container" style="display: none;">
                    <div class="imtihan-selector-wrapper">
                        <label for="select-imtihan"><i data-lucide="award"></i> Periode:</label>
                        <select id="select-imtihan" class="form-input-sm" onchange="changeImtihanPeriod(this.value)">
                            <option value="Imtihan 1">Imtihan 1 (Semester Ganjil)</option>
                            <option value="Imtihan 2">Imtihan 2 (Semester Genap)</option>
                        </select>
                    </div>
                    
                    <div class="imtihan-selector-wrapper">
                        <label for="select-mapel"><i data-lucide="book"></i> Mapel:</label>
                        <select id="select-mapel" class="form-input-sm" onchange="changeMapel(this.value)">
                            <option value="">-- Pilih Mapel --</option>
                        </select>
                        <button type="button" class="btn-primary" style="padding: 6px 12px; border-radius: 4px; font-size: 0.8rem; white-space: nowrap; cursor: pointer;" onclick="openModalTambahMapel()">+ Mapel</button>
                    </div>
                </div>
            </div>

            <div class="absensi-content-card">
                <div id="view-kelas">
                    <div id="empty-state-kelas" class="empty-state">
                        <div class="empty-icon-wrapper"><i data-lucide="school"></i></div>
                        <h3 class="empty-title">Belum Ada Data Kelas</h3>
                        <p class="empty-desc">Tambahkan kelas terlebih dahulu pada menu Data Santri untuk mulai melakukan penilaian.</p>
                    </div>
                    <div id="kelas-grid-container" class="kelas-grid hidden"></div>
                </div>

                <div id="view-absensi" class="hidden">
                    
                    <!-- PERBAIKAN: Penambahan ID dan Tombol X -->
                    <div id="guide-box-nilai" class="absensi-guide-box">
                        <div class="guide-icon"><i data-lucide="info"></i></div>
                        <div class="guide-text">
                            <strong>Panduan Penilaian:</strong>
                            <p>Pastikan Mapel sudah dipilih. Klik nama santri untuk menambahkan nilai Ulangan Harian (UH). Setelah semua nilai diinput, klik tombol <b>Simpan Data Nilai</b> di bawah.</p>
                        </div>
                        <button class="btn-close-guide" onclick="closeGuideBox()" title="Tutup Panduan">
                            <i data-lucide="x" style="width: 18px; height: 18px;"></i>
                        </button>
                    </div>

                    <div id="santri-absensi-container" class="absensi-list-grid"></div>

                    <div class="absensi-bottom-bar">
                        <div class="today-date-info">
                            <i data-lucide="database"></i>
                            <span>Sinkronisasi ke Database Firebase</span>
                        </div>
                        <button id="btn-save-absensi" class="btn-primary btn-save-absensi" onclick="saveAllNilai()" disabled>
                            <i data-lucide="save"></i>
                            <span>Simpan Data Nilai</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- MODAL INPUT NILAI (PER SANTRI) -->
        <div id="modal-input-nilai" class="modal-overlay">
            <div class="modal-card modal-sm">
                <div class="modal-header">
                    <div class="modal-header-title">
                        <i data-lucide="edit-3" class="modal-header-icon"></i>
                        <h3>Input Nilai Santri</h3>
                    </div>
                    <button class="btn-close-modal" onclick="closeModalNilai()">
                        <i data-lucide="x"></i>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="target-santri-info" style="margin-bottom: 20px;">
                        <h4 id="modal-santri-nama-nilai">Nama Santri</h4>
                        <span id="modal-mapel-text" class="text-date-badge">Mapel Terpilih</span>
                    </div>
                    
                    <div id="uh-inputs-container">
                        <!-- Injected by JS -->
                    </div>
                    
                    <button class="btn-tambah-uh" onclick="addUhInput()">
                        <i data-lucide="plus-circle" style="width: 18px; height: 18px;"></i> Tambah UH Berikutnya
                    </button>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-cancel" onclick="closeModalNilai()">Batal</button>
                    <button type="button" class="btn btn-save-active" onclick="simpanNilaiSantriModal()">Simpan (Sementara)</button>
                </div>
            </div>
        </div>

        <!-- MODAL TAMBAH MAPEL -->
        <div id="modal-tambah-mapel" class="modal-overlay">
            <div class="modal-card modal-sm">
                <div class="modal-header">
                    <div class="modal-header-title">
                        <i data-lucide="book-plus" class="modal-header-icon"></i>
                        <h3>Tambah Mata Pelajaran</h3>
                    </div>
                    <button class="btn-close-modal" onclick="closeModalTambahMapel()">
                        <i data-lucide="x"></i>
                    </button>
                </div>
                <div class="modal-body">
                    <label style="font-size: 0.85rem; font-weight: 600; color: var(--text-main); margin-bottom: 8px; display: block;">Nama Mapel Baru</label>
                    <input type="text" id="input-nama-mapel" class="form-input-sm" style="width: 100%; padding: 10px; font-size: 1rem;" placeholder="Misal: Fiqih, Nahwu, Bahasa Arab...">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-cancel" onclick="closeModalTambahMapel()">Batal</button>
                    <button type="button" class="btn btn-save-active" onclick="simpanMapelBaru()">Simpan Mapel</button>
                </div>
            </div>
        </div>

        <!-- MODAL SUKSES -->
        <div id="modal-success-alert" class="modal-overlay">
            <div class="modal-card modal-sm text-center">
                <div class="success-icon-wrapper">
                    <i data-lucide="check-circle"></i>
                </div>
                <h3 class="success-title">Berhasil!</h3>
                <p id="success-message" class="success-message">Data berhasil disimpan.</p>
                <div class="modal-footer" style="justify-content: center; border-top: none; margin-top: 5px;">
                    <button type="button" class="btn btn-save-active" onclick="closeSuccessModal()" style="width: 100%;">Oke, Mengerti</button>
                </div>
            </div>
        </div>
    </template>

    <script src="js/main.js"></script>
    <script type="module" src="js/nilai.js"></script>
</body>
</html>
